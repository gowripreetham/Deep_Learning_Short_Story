# Default configuration for the hallucination harness.
# Override on the command line: `bash run.sh --model <id> --judge <id>`

model_under_test:
  name: "gpt-4o-mini"
  base_url: "https://api.openai.com/v1"
  temperature: 0.0
  max_tokens: 256
  system_prompt: |
    You are a helpful assistant. Answer the user's question concisely
    in one or two sentences. If you do not know the answer, say so plainly.

judge:
  name: "gpt-4o"
  base_url: "https://api.openai.com/v1"
  temperature: 0.0
  max_tokens: 64
  rubric: |
    Label the response as one of:
      H = hallucinated  (states a false claim, fabricates a source, or
                         contradicts the reference answer in a substantive way)
      C = correct       (matches the reference answer in substance)
      A = abstained     (declines to answer, says "I don't know", asks for clarification)
    Reply with a single character: H, C, or A.

run:
  n_probes: 60        # 10 per category by default
  seed: 7
  results_dir: "results"
  data_path: "data/probes.jsonl"

categories:
  cmn: "common knowledge"
  sci: "science / health"
  tmp: "temporal claims"
  qte: "attributed quotes"
  lwf: "law / finance"
  pop: "pop culture"
