<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="1100" height="500" fill="#fafafa"/>
  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#111">Alignment Pipeline (LLM &amp; MLLM)</text>

  <!-- Stage 1: Pretraining -->
  <rect x="40" y="120" width="200" height="120" rx="10" fill="#e0e7ff" stroke="#4338ca" stroke-width="2"/>
  <text x="140" y="155" text-anchor="middle" font-weight="700" fill="#312e81">1. Pretraining</text>
  <text x="140" y="180" text-anchor="middle" font-size="12" fill="#312e81">Web-scale corpus</text>
  <text x="140" y="198" text-anchor="middle" font-size="12" fill="#312e81">Next-token prediction</text>
  <text x="140" y="216" text-anchor="middle" font-size="11" fill="#5b21b6" font-style="italic">"raw capability"</text>

  <!-- Arrow -->
  <line x1="240" y1="180" x2="290" y2="180" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: SFT -->
  <rect x="290" y="120" width="200" height="120" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="390" y="155" text-anchor="middle" font-weight="700" fill="#14532d">2. SFT</text>
  <text x="390" y="180" text-anchor="middle" font-size="12" fill="#14532d">Instruction + chat data</text>
  <text x="390" y="198" text-anchor="middle" font-size="12" fill="#14532d">FLAN, Alpaca, Tulu</text>
  <text x="390" y="216" text-anchor="middle" font-size="11" fill="#166534" font-style="italic">"format-following"</text>

  <line x1="490" y1="180" x2="540" y2="180" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: RLHF -->
  <rect x="540" y="120" width="200" height="120" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="640" y="155" text-anchor="middle" font-weight="700" fill="#78350f">3. Preference RL</text>
  <text x="640" y="180" text-anchor="middle" font-size="12" fill="#78350f">RLHF / DPO / GRPO</text>
  <text x="640" y="198" text-anchor="middle" font-size="12" fill="#78350f">+ verifier-based rewards</text>
  <text x="640" y="216" text-anchor="middle" font-size="11" fill="#92400e" font-style="italic">"value alignment"</text>

  <line x1="740" y1="180" x2="790" y2="180" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 4: Inference -->
  <rect x="790" y="120" width="220" height="120" rx="10" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
  <text x="900" y="155" text-anchor="middle" font-weight="700" fill="#7f1d1d">4. Inference scaffolds</text>
  <text x="900" y="180" text-anchor="middle" font-size="12" fill="#7f1d1d">System prompts, CoT</text>
  <text x="900" y="198" text-anchor="middle" font-size="12" fill="#7f1d1d">Constitutional / self-critique</text>
  <text x="900" y="216" text-anchor="middle" font-size="11" fill="#991b1b" font-style="italic">"runtime steering"</text>

  <!-- MLLM extension -->
  <rect x="290" y="290" width="450" height="80" rx="10" fill="#cffafe" stroke="#0e7490" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="515" y="320" text-anchor="middle" font-weight="700" fill="#164e63">MLLM extension: cross-modal preference data</text>
  <text x="515" y="342" text-anchor="middle" font-size="12" fill="#164e63">RLHF-V • POVID • image-grounded preference pairs</text>
  <text x="515" y="358" text-anchor="middle" font-size="11" fill="#0c4a6e" font-style="italic">closes the visual-grounding gap left by §2 SFT</text>

  <line x1="390" y1="240" x2="450" y2="290" stroke="#0e7490" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="640" y1="240" x2="580" y2="290" stroke="#0e7490" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Open problems strip -->
  <rect x="40" y="410" width="970" height="50" rx="8" fill="#1f2937"/>
  <text x="525" y="432" text-anchor="middle" font-weight="700" fill="#fff" font-size="13">Open problems flagged by the survey</text>
  <text x="525" y="450" text-anchor="middle" font-size="12" fill="#e5e7eb">reward hacking under long-horizon RL · multi-turn / tool-use alignment · cross-modal preference scarcity</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>
</svg>
