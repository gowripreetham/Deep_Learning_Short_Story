<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="1100" height="760" fill="#fafafa"/>
  <text x="550" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#111">Cross-Cutting Tensions Across the Nine Dimensions</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#555">Optimizing one dimension typically pays in another</text>

  <!-- Two-column layout: graph on left, tensions list on right -->

  <!-- Graph (left) -->
  <g transform="translate(40,80)">
    <g font-size="13" font-weight="700">
      <circle cx="290" cy="80" r="48" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
      <text x="290" y="76" text-anchor="middle" fill="#7f1d1d">Bias &amp;</text>
      <text x="290" y="92" text-anchor="middle" fill="#7f1d1d">Fairness</text>

      <circle cx="490" cy="180" r="48" fill="#ffedd5" stroke="#c2410c" stroke-width="2"/>
      <text x="490" y="186" text-anchor="middle" fill="#7c2d12">Alignment</text>

      <circle cx="540" cy="340" r="48" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="540" y="346" text-anchor="middle" fill="#78350f">Security</text>

      <circle cx="450" cy="500" r="48" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <text x="450" y="506" text-anchor="middle" fill="#14532d">Privacy</text>

      <circle cx="290" cy="580" r="48" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
      <text x="290" y="578" text-anchor="middle" fill="#164e63">Halluc.</text>

      <circle cx="130" cy="500" r="48" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
      <text x="130" y="506" text-anchor="middle" fill="#1e3a8a">Uncert.</text>

      <circle cx="40" cy="340" r="48" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
      <text x="40" y="338" text-anchor="middle" fill="#4c1d95">Distrib.</text>
      <text x="40" y="354" text-anchor="middle" fill="#4c1d95">Shift</text>

      <circle cx="90" cy="180" r="48" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
      <text x="90" y="178" text-anchor="middle" fill="#701a75">Explain-</text>
      <text x="90" y="194" text-anchor="middle" fill="#701a75">ability</text>

      <circle cx="290" cy="340" r="55" fill="#1f2937"/>
      <text x="290" y="338" text-anchor="middle" fill="#fff" font-size="13">AIGC</text>
      <text x="290" y="356" text-anchor="middle" fill="#fff" font-size="13">Detection</text>
    </g>

    <g stroke="#374151" stroke-width="1.2" fill="none" opacity="0.7">
      <line x1="290" y1="128" x2="490" y2="180"/>
      <line x1="490" y1="228" x2="540" y2="340"/>
      <line x1="540" y1="388" x2="450" y2="500"/>
      <line x1="450" y1="548" x2="290" y2="580"/>
      <line x1="290" y1="580" x2="130" y2="500"/>
      <line x1="130" y1="500" x2="40" y2="340"/>
      <line x1="40" y1="340" x2="90" y2="180"/>
      <line x1="90" y1="180" x2="290" y2="80"/>

      <!-- AIGC Detection (center) connections -->
      <line x1="290" y1="285" x2="290" y2="128"/>
      <line x1="335" y1="320" x2="490" y2="180"/>
      <line x1="345" y1="340" x2="492" y2="340"/>
      <line x1="335" y1="380" x2="450" y2="500"/>
      <line x1="290" y1="395" x2="290" y2="532"/>
      <line x1="245" y1="380" x2="130" y2="500"/>
      <line x1="237" y1="340" x2="88" y2="340"/>
      <line x1="245" y1="320" x2="90" y2="180"/>
    </g>
  </g>

  <!-- Right: tensions list -->
  <g transform="translate(620,90)">
    <text x="0" y="0" font-size="16" font-weight="700" fill="#111">Five tensions to remember</text>
    <g font-size="13" fill="#1f2937">
      <g transform="translate(0,30)">
        <rect x="0" y="0" width="450" height="90" rx="8" fill="#fff" stroke="#fee2e2" stroke-width="2"/>
        <text x="14" y="22" font-weight="700" fill="#b91c1c">Bias × Security</text>
        <text x="14" y="46">adversarial training improves robustness</text>
        <text x="14" y="64">but hurts fairness — penalizes</text>
        <text x="14" y="82">underrepresented groups disproportionately</text>
      </g>
      <g transform="translate(0,135)">
        <rect x="0" y="0" width="450" height="90" rx="8" fill="#fff" stroke="#ffedd5" stroke-width="2"/>
        <text x="14" y="22" font-weight="700" fill="#7c2d12">Bias × AIGC detection</text>
        <text x="14" y="46">non-native English mis-flagged as</text>
        <text x="14" y="64">AI-generated; inconsistent watermarks</text>
        <text x="14" y="82">compound the disparity</text>
      </g>
      <g transform="translate(0,240)">
        <rect x="0" y="0" width="450" height="68" rx="8" fill="#fff" stroke="#dcfce7" stroke-width="2"/>
        <text x="14" y="22" font-weight="700" fill="#15803d">Security × Privacy</text>
        <text x="14" y="46">MIA + extraction + model stealing are</text>
        <text x="14" y="62">security attacks on a privacy objective</text>
      </g>
      <g transform="translate(0,325)">
        <rect x="0" y="0" width="450" height="68" rx="8" fill="#fff" stroke="#dbeafe" stroke-width="2"/>
        <text x="14" y="22" font-weight="700" fill="#1e3a8a">Uncertainty × Alignment</text>
        <text x="14" y="46">aligning models to express uncertainty</text>
        <text x="14" y="62">cannot capture "unknown unknowns"</text>
      </g>
      <g transform="translate(0,410)">
        <rect x="0" y="0" width="450" height="90" rx="8" fill="#fff" stroke="#cffafe" stroke-width="2"/>
        <text x="14" y="22" font-weight="700" fill="#164e63">Halluc. × Shift × Alignment</text>
        <text x="14" y="46">RAG patches hallucinations under shift,</text>
        <text x="14" y="64">but pushes the burden to the retriever —</text>
        <text x="14" y="82">which has its own bias / privacy / failures</text>
      </g>
    </g>
  </g>

  <text x="550" y="745" text-anchor="middle" font-size="11" fill="#888">After Yang et al. §12 — original redrawing</text>
</svg>
