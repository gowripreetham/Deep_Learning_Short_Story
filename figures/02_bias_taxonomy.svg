<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="1000" height="600" fill="#fafafa"/>
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#111">Bias &amp; Fairness Taxonomy</text>

  <!-- Root -->
  <rect x="420" y="70" width="160" height="40" rx="8" fill="#1f2937"/>
  <text x="500" y="95" text-anchor="middle" fill="#fff" font-weight="700" font-size="14">Bias &amp; Fairness</text>

  <!-- Two main branches -->
  <line x1="500" y1="110" x2="220" y2="160" stroke="#9ca3af" stroke-width="2"/>
  <line x1="500" y1="110" x2="780" y2="160" stroke="#9ca3af" stroke-width="2"/>

  <rect x="120" y="160" width="200" height="40" rx="8" fill="#fee2e2" stroke="#b91c1c"/>
  <text x="220" y="185" text-anchor="middle" font-weight="700" fill="#7f1d1d">Bias Categories (6)</text>

  <rect x="680" y="160" width="200" height="40" rx="8" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="780" y="185" text-anchor="middle" font-weight="700" fill="#1e3a8a">Methods</text>

  <!-- Bias categories -->
  <g font-size="12" fill="#111">
    <rect x="40" y="230" width="160" height="32" rx="6" fill="#fff" stroke="#b91c1c"/><text x="120" y="251" text-anchor="middle">Pejorative language</text>
    <rect x="40" y="272" width="160" height="32" rx="6" fill="#fff" stroke="#b91c1c"/><text x="120" y="293" text-anchor="middle">Linguistic diversity</text>
    <rect x="40" y="314" width="160" height="32" rx="6" fill="#fff" stroke="#b91c1c"/><text x="120" y="335" text-anchor="middle">Normativity</text>
    <rect x="240" y="230" width="160" height="32" rx="6" fill="#fff" stroke="#b91c1c"/><text x="320" y="251" text-anchor="middle">Misrepresentation</text>
    <rect x="240" y="272" width="160" height="32" rx="6" fill="#fff" stroke="#b91c1c"/><text x="320" y="293" text-anchor="middle">Stereotype</text>
    <rect x="240" y="314" width="160" height="32" rx="6" fill="#fff" stroke="#b91c1c"/><text x="320" y="335" text-anchor="middle">Hate speech</text>
  </g>

  <!-- Methods -->
  <line x1="780" y1="200" x2="640" y2="240" stroke="#9ca3af" stroke-width="2"/>
  <line x1="780" y1="200" x2="920" y2="240" stroke="#9ca3af" stroke-width="2"/>

  <rect x="540" y="240" width="200" height="36" rx="6" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="640" y="263" text-anchor="middle" font-weight="700" fill="#1e3a8a">Evaluation</text>
  <rect x="820" y="240" width="200" height="36" rx="6" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="920" y="263" text-anchor="middle" font-weight="700" fill="#1e3a8a">Mitigation</text>

  <!-- Evaluation children -->
  <g font-size="12">
    <rect x="500" y="296" width="280" height="28" rx="5" fill="#fff" stroke="#1d4ed8"/><text x="640" y="315" text-anchor="middle">Generated text — BBQ, StereoSet, BOLD</text>
    <rect x="500" y="328" width="280" height="28" rx="5" fill="#fff" stroke="#1d4ed8"/><text x="640" y="347" text-anchor="middle">Embedding — WEAT family</text>
    <rect x="500" y="360" width="280" height="28" rx="5" fill="#fff" stroke="#1d4ed8"/><text x="640" y="379" text-anchor="middle">Probability — likelihood gaps</text>
  </g>

  <!-- Mitigation children -->
  <g font-size="12">
    <rect x="780" y="296" width="220" height="28" rx="5" fill="#fff" stroke="#1d4ed8"/><text x="890" y="315" text-anchor="middle">Pre-training (data, embeddings)</text>
    <rect x="780" y="328" width="220" height="28" rx="5" fill="#fff" stroke="#1d4ed8"/><text x="890" y="347" text-anchor="middle">In-training (adversarial, RLHF)</text>
    <rect x="780" y="360" width="220" height="28" rx="5" fill="#fff" stroke="#1d4ed8"/><text x="890" y="379" text-anchor="middle">Post-processing (filter, rewrite)</text>
  </g>

  <!-- Modalities row -->
  <rect x="120" y="430" width="760" height="50" rx="8" fill="#fef3c7" stroke="#b45309"/>
  <text x="500" y="450" text-anchor="middle" font-weight="700" fill="#78350f">In MLLMs and image generators, biases amplify:</text>
  <text x="500" y="468" text-anchor="middle" font-size="12" fill="#78350f">stereotype amplification, default-human bias, Western-centric defaults</text>

  <text x="500" y="540" text-anchor="middle" font-size="13" fill="#374151" font-style="italic">"No method dominates — every fairness fix trades off capability or another dimension."</text>
  <text x="500" y="575" text-anchor="middle" font-size="11" fill="#888">Adapted from Yang et al. §3 — original redrawing</text>
</svg>
